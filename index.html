  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل أدوية السكري | مستشفى بدية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500&display=swap" rel="stylesheet">
</head>

<body>

<header>
  🏥 قسم الصيدلة و المخزن الطبي – مستشفى بدية
  <div class="sub-header">📦 دليل أدوية السكري</div>
</header>

<!-- أزرار الأقسام -->
<div class="buttons">
  <button onclick="showCategory('tablets')">💊 الحبوب</button>
  <button onclick="showCategory('injections')">💉 الحقن</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="ابحث عن اسم الدواء...">
  <button id="clearSearch">❌</button>
</div>

<div id="gallery"></div>

<!-- نافذة التفاصيل الأساسية -->
<div id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="">
    <h3 id="modal-name"></h3>
    <p id="modal-uses"></p>
    <button class="read-more" onclick="openMore()">اقرأ المزيد</button>
  </div>
</div>

<!-- نافذة التفاصيل الكاملة -->
<div id="moreModal">
  <div class="more-content">
    <span class="close" onclick="closeMore()">&times;</span>
    <div id="more-text"></div>
  </div>
</div>

<footer>By: Jouharah.IT & Sara.Pharmasist</footer>

<!-- السكربت -->
<script src="script.js"></script>

</body>
</html>
