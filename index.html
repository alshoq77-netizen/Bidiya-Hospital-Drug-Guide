<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دليل الأدوية | مستشفى بدية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
  🏥 قسم الصيدلة و المخزن الطبي – مستشفى بدية
  <div class="sub-header">📦 دليل الأدوية</div>

  <!-- أدوات الإدارة -->
  <div class="admin-bar">
    <button id="adminLoginBtn" class="admin-btn">🔐 Admin</button>
    <button id="adminPanelBtn" class="admin-btn" style="display:none;">⚙️ لوحة التحكم</button>
    <button id="adminLogoutBtn" class="admin-btn danger" style="display:none;">🚪 خروج</button>
  </div>
</header>

<!-- أزرار الأقسام (تتولد تلقائيًا من JS) -->
<div class="buttons" id="categoryButtons"></div>

<div class="search-box">
  <input type="text" id="search" placeholder="ابحث عن اسم الدواء...">
  <button id="clearSearch">❌</button>
</div>

<div id="gallery"></div>

<!-- نافذة التفاصيل الأساسية -->
<div id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="">
    <h3 id="modal-name"></h3>
    <p id="modal-uses"></p>
    <button class="read-more" onclick="openMore()">اقرأ المزيد</button>
  </div>
</div>

<!-- نافذة التفاصيل الكاملة -->
<div id="moreModal">
  <div class="more-content">
    <span class="close" onclick="closeMore()">&times;</span>
    <div id="more-text"></div>
  </div>
</div>

<!-- نافذة تسجيل دخول الإدارة -->
<div id="adminLoginModal" class="admin-modal">
  <div class="admin-modal-content">
    <span class="close" id="adminLoginClose">&times;</span>
    <h3>تسجيل دخول Admin</h3>
    <p class="hint">أدخل كلمة المرور للوصول إلى لوحة التحكم</p>
    <input type="password" id="adminPassword" placeholder="Password" />
    <button id="adminLoginSubmit" class="primary">دخول</button>
    <div id="adminLoginMsg" class="msg"></div>
  </div>
</div>

<!-- لوحة التحكم -->
<div id="adminPanelModal" class="admin-modal">
  <div class="admin-modal-content wide">
    <span class="close" id="adminPanelClose">&times;</span>
    <h3>لوحة التحكم</h3>

    <div class="admin-grid">
      <!-- إضافة قسم -->
      <div class="admin-card">
        <h4>➕ إضافة قسم جديد</h4>
        <label>اسم القسم</label>
        <input type="text" id="newCatName" placeholder="مثال: أدوية الربو" />
        <label>أيقونة (اختياري)</label>
        <input type="text" id="newCatIcon" placeholder="مثال: 🫁 أو ❤️" />
        <button id="addCategoryBtn" class="primary">إضافة القسم</button>
        <div id="catMsg" class="msg"></div>
      </div>

      <!-- إضافة دواء -->
      <div class="admin-card">
        <h4>➕ إضافة دواء جديد</h4>

        <label>اختر القسم</label>
        <select id="medCategory"></select>

        <label>اسم الدواء</label>
        <input type="text" id="medName" placeholder="مثال: Salbutamol Inhaler" />

        <label>رابط الصورة</label>
        <input type="url" id="medImg" placeholder="https://..." />

        <label>وصف مختصر (يظهر على البطاقة)</label>
        <input type="text" id="medUses" placeholder="مثال: موسع للشعب الهوائية..." />

        <label>الوصف القصير (يظهر داخل النافذة الأولى)</label>
        <textarea id="medShort" rows="3" placeholder="سطرين أو نقاط مختصرة..."></textarea>

        <label>التفاصيل الكاملة (HTML مسموح)</label>
        <textarea id="medDetails" rows="8" placeholder="مثال: <h4>🕒 طريقة الاستخدام</h4> ..."></textarea>

        <button id="addMedicineBtn" class="primary">إضافة الدواء</button>
        <div id="medMsg" class="msg"></div>
      </div>

      <!-- إدارة سريعة -->
      <div class="admin-card full">
        <h4>🧹 إدارة البيانات</h4>
        <div class="row">
          <button id="exportBtn">⬇️ تصدير JSON</button>
          <button id="importBtn">⬆️ استيراد JSON</button>
          <button id="resetBtn" class="danger">♻️ إعادة ضبط (يرجع الافتراضي)</button>
        </div>
        <textarea id="jsonArea" rows="8" placeholder="هنا سيظهر JSON للتصدير أو ضع JSON للاستيراد"></textarea>
        <div id="dataMsg" class="msg"></div>
      </div>
    </div>
  </div>
</div>

<footer>By: Jouharah.IT & Sara.Pharmasist</footer>

<script src="./script.js"></script>
</body>
</html>
